name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build (e.g. v1.2.3). The tag must already exist in the repository.'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write   # required to create / update GitHub Releases

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_B64" | tr -dc 'A-Za-z0-9+/=' | base64 --decode > "${{ runner.temp }}/release.keystore"
          if [ ! -s "${{ runner.temp }}/release.keystore" ]; then
            echo "::error::Decoded keystore file is empty — check RELEASE_KEYSTORE_BASE64"
            exit 1
          fi

      - name: Build signed release APK and AAB
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease \
            --no-daemon --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: EXIFiler ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            androidApp/build/outputs/apk/release/*.apk
            androidApp/build/outputs/bundle/release/*.aab
